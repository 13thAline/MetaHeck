name: bank-kyc-audit-env
version: "2.0.0"
description: >
  BankKYCAuditEnv — an advanced 2025-standard KYC and AML audit environment.
  The agent acts as a Senior KYC Analyst/Fraud Investigator inspecting customer profiles,
  uploaded documents, 90-day transaction histories, device signals, and behavioral
  velocity anomalies. The agent must detect real-world red flags including synthetic
  identity fraud (Frankenstein IDs), money mule networks, circular transactions, and PEPs.

author: metaheck-team
tags:
  - banking
  - compliance
  - fraud-detection
  - aml
  - kyc
  - openenv

tasks:
  - id: task1_easy
    difficulty: easy
    description: >
      Clean individual customer with minor address mismatch.
      Agent must correctly verify documentation and approve the onboarding.
    max_steps: 10
    expected_score_range: [0.75, 1.00]

  - id: task2_medium
    difficulty: medium
    description: >
      Customer with suspicious but explainable transactions, plus incomplete source-of-funds.
      Agent must interview the customer, request additional documentation, and analyze patterns.
    max_steps: 15
    expected_score_range: [0.50, 0.85]

  - id: task3_hard
    difficulty: hard
    description: >
      Sophisticated synthetic identity combined with a money mule network.
      Includes circular transactions, PEP links, and deepfake-style document artifacts.
      Requires extensive multi-step reasoning, watchlists checks, and careful evidence assembly.
    max_steps: 25
    expected_score_range: [0.15, 0.40]

observation_space:
  type: structured
  fields:
    - task_id: string
    - episode_id: string
    - step: integer
    - max_steps: integer
    - customers: list[CustomerProfile]
    - available_actions: list[string]
    - completed_actions: list[Action]
    - task_description: string
    - message: string
    - interview_log: list[string]
    - watchlist_report: string

action_space:
  type: structured
  actions:
    - request_additional_documents: "Ask customer to submit specific missing/expired documents"
    - verify_document_authenticity: "Run forensic checks on uploaded IDs and proofs"
    - analyze_transaction_patterns: "Use internal algorithms to score transaction layering"
    - check_watchlists: "Query internal sanctions and PEP databases"
    - interview_customer: "Ask customer specific questions about source of funds or activity"
    - perform_risk_scoring: "Calculate risk tier securely"
    - approve: "Final Decision: Approve customer"
    - reject: "Final Decision: Reject customer for fraud"
    - escalate: "Final Decision: Escalate to Level 3 Compliance Director"
    - freeze: "Final Decision: Freeze account and file SAR"

reward:
  range: [0.0, 1.0]
  type: dense
  components:
    - correct_sequencing: 0.20
    - accurate_flag_detection: 0.30
    - efficient_investigation: 0.10
    - professional_interviewing: 0.10
    - correct_final_decision: 0.30
    - penalty: variable (false approve, false reject)

api:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state"
  grade: "GET /grade"
  tasks: "GET /tasks"
  health: "GET /health"

runtime:
  port: 7860
  framework: fastapi